<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawedIn – Professional Network for Dogs</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: #f3f2ef;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #0a66c2;
  color: white;
  padding: 10px 20px;
}

.nav-links button {
  margin: 0 5px;
  background: none;
  border: none;
  color: white;
  cursor: pointer;
}

/* LAYOUT */
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 300px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

/* CHAT */
#chatBox {
  height: 150px;
  overflow-y: auto;
  border: 1px solid #ccc;
  padding: 5px;
}

/* BUTTON */
button {
  padding: 8px;
  border: none;
  background: #0a66c2;
  color: white;
  cursor: pointer;
  border-radius: 5px;
  width: 100%;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
  <div><b>🐾 PawedIn</b></div>
  <div class="nav-links">
    <button onclick="alert('Feed coming soon')">🏠 Home</button>
    <button onclick="alert('Network coming soon')">🐕 Network</button>
    <button onclick="alert('Jobs coming soon')">💼 Jobs</button>
  </div>
</nav>

<div class="container">

<!-- PROFILE -->
<div class="card">
  <h3>Create Dog Profile</h3>
  <input id="name" placeholder="Dog Name"><br>
  <input id="breed" placeholder="Breed"><br>

  <select id="skill">
    <option>Ball Fetching 🎾</option>
    <option>Squirrel Detection 🐿️</option>
    <option>Snack Hunting 🍗</option>
  </select>

  <button onclick="createProfile()">Create</button>
  <p id="share"></p>
</div>

<!-- PROFILE VIEW -->
<div id="profile" class="card" style="display:none;"></div>

<!-- LEADERBOARD -->
<div class="card">
  <h3>🏆 Top Dogs</h3>
  <ul id="leaderboard"></ul>
</div>

<!-- CHAT -->
<div class="card">
  <h3>💬 Dog Chat</h3>
  <div id="chatBox"></div>
  <input id="chatInput">
  <button onclick="sendMessage()">Send</button>
</div>

</div>

<!-- AUDIO -->
<audio id="bark" src="bark.mp3"></audio>

<script>

// LEADERBOARD
let leaderboard = [];

// CREATE PROFILE
function createProfile(){
  const bark = document.getElementById("bark");
  bark.currentTime = 0;
  bark.play();

  const name = document.getElementById("name").value;
  const breed = document.getElementById("breed").value;
  const skill = document.getElementById("skill").value;

  const wph = Math.floor(Math.random()*200);

  document.getElementById("profile").style.display="block";
  document.getElementById("profile").innerHTML=`
    <h2>${name}</h2>
    <p><b>Breed:</b> ${breed}</p>
    <p><b>Skill:</b> ${skill}</p>
    <p><b>Headline:</b> Senior Bark Engineer</p>
    <p><b>Wag-per-Hour:</b> ${wph}</p>
  `;

  addToLeaderboard(name, wph);

  document.getElementById("share").innerText =
    "Share: " + window.location.href + "?dog=" + name;
}

// LEADERBOARD
function addToLeaderboard(name, score){
  leaderboard.push({name,score});
  leaderboard.sort((a,b)=>b.score-a.score);

  const list = document.getElementById("leaderboard");
  list.innerHTML="";

  leaderboard.slice(0,5).forEach(d=>{
    list.innerHTML += `<li>${d.name} - ${d.score}</li>`;
  });
}

// CHAT
function sendMessage(){
  const msg = document.getElementById("chatInput").value;
  const box = document.getElementById("chatBox");

  box.innerHTML += `<p><b>You:</b> ${msg}</p>`;

  const replies = [
    "Woof. Noted.",
    "Let's circle back after snacks.",
    "Strong barking insight.",
    "Agreed. Woof."
  ];

  setTimeout(()=>{
    box.innerHTML += `<p><b>Bruno:</b> ${replies[Math.floor(Math.random()*replies.length)]}</p>`;
  },500);
}

</script>

</body>
</html>
