<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pawfessional 🐶</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(6px);
  z-index:-1;
}

/* HEADER */
header {
  background: rgba(10,102,194,0.9);
  color: white;
  padding: 12px 20px;
  font-size: 20px;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
  flex-wrap: wrap;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.95);
  padding: 15px;
  width: 300px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  animation: fadeIn 0.6s;
}

.card:hover {
  transform: scale(1.03);
}

/* INPUT */
input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

/* BUTTON */
button {
  background: #0a66c2;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 5px;
  width: 100%;
  cursor: pointer;
}

button:hover {
  background: #004182;
}

/* CHAT */
#chatBox {
  height: 150px;
  overflow-y: auto;
  border: 1px solid #ccc;
  padding: 5px;
  font-size: 13px;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<header>
  🐶 Pawfessional
</header>

<div class="container">

  <!-- PROFILE -->
  <div class="card">
    <h3>🐶 Create Profile</h3>
    <input id="name" placeholder="Dog Name">
    <input id="breed" placeholder="Breed">

    <select id="skill">
      <option>Ball Fetching 🎾</option>
      <option>Squirrel Detection 🐿️</option>
      <option>Sock Theft 🧦</option>
      <option>Emotional Manipulation 🥺</option>
    </select>

    <button onclick="createProfile()">Create Profile</button>
    <p id="shareLink"></p>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="card" style="display:none;"></div>

  <!-- LEADERBOARD -->
  <div class="card">
    <h3>🏆 Top Dogs</h3>
    <ul id="leaderboard"></ul>
  </div>

  <!-- CHAT -->
  <div class="card">
    <h3>💬 Dog Chat</h3>
    <div id="chatBox"></div>
    <input id="chatInput" placeholder="Send message">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<!-- SOUND -->
<audio id="barkSound" src="bark.mp3"></audio>

<script>

// LEADERBOARD
let leaderboard = [];

// BACKGROUND
fetch("https://dog.ceo/api/breeds/image/random")
.then(res=>res.json())
.then(data=>{
  document.body.style.backgroundImage=`url(${data.message})`;
  document.body.style.backgroundSize="cover";
});

// CREATE PROFILE
function createProfile(){

  // SOUND
  const bark = document.getElementById("barkSound");
  bark.currentTime = 0;
  bark.play();

  const name = document.getElementById("name").value;
  const breed = document.getElementById("breed").value;
  const skill = document.getElementById("skill").value;

  const wph = Math.floor(Math.random()*200);

  // SHARE LINK
  const link = `?name=${name}&breed=${breed}&skill=${skill}`;
  document.getElementById("shareLink").innerText =
    "Share: " + window.location.href + link;

  fetch("https://dog.ceo/api/breeds/image/random")
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("profile").style.display="block";
    document.getElementById("profile").innerHTML=`
      <img src="${data.message}" style="width:100%; border-radius:10px;">
      <h2>${name}</h2>
      <p><b>Breed:</b> ${breed}</p>
      <p><b>Skill:</b> ${skill}</p>

      <hr>

      <p><b>Headline:</b> Senior Bark Engineer</p>
      <p><b>About:</b> Results-driven canine with expertise in barking and snack acquisition.</p>

      <p><b>Wag-per-Hour:</b> ${wph}</p>
    `;

    addToLeaderboard(name, wph);
  });
}

// LEADERBOARD FUNCTION
function addToLeaderboard(name, score){
  leaderboard.push({name,score});
  leaderboard.sort((a,b)=>b.score-a.score);

  const list = document.getElementById("leaderboard");
  list.innerHTML="";

  leaderboard.slice(0,5).forEach(d=>{
    list.innerHTML += `<li>${d.name} - ${d.score} WPH</li>`;
  });
}

// CHAT
function sendMessage(){
  const input = document.getElementById("chatInput").value;
  const chatBox = document.getElementById("chatBox");

  chatBox.innerHTML += `<p><b>You:</b> ${input}</p>`;

  const replies = [
    "Woof. I agree with your insights.",
    "Let's take this offline (walk).",
    "Strong barking strategy.",
    "Circle back after snacks.",
    "Woof woof (noted)."
  ];

  const reply = replies[Math.floor(Math.random()*replies.length)];

  setTimeout(()=>{
    chatBox.innerHTML += `<p><b>Bruno:</b> ${reply}</p>`;
  },500);
}

</script>

</body>
</html>
